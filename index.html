<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Rue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --deep: #0f0a0a;
    --card: #130d0d;
    --border: #1e1414;
    --crimson: #8b1a1a;
    --crimson-light: #c0392b;
    --crimson-glow: rgba(139, 26, 26, 0.15);
    --text: #d4c4c4;
    --muted: #6b5555;
    --white: #f0e8e8;
  }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Landing */
  #landing {
    text-align: center;
    padding: 40px 30px;
    animation: fadeUp 1s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .landing-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    color: var(--crimson-light);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .landing-tagline {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .landing-sub {
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
    margin-bottom: 50px;
    opacity: 0.6;
  }

  #startBtn {
    background: transparent;
    border: 1px solid var(--crimson);
    color: var(--crimson-light);
    padding: 14px 50px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  #startBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--crimson);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  #startBtn:hover::before { transform: scaleX(1); }
  #startBtn:hover { color: var(--white); }

  .brand-tag {
    margin-top: 60px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 2px;
    opacity: 0.4;
    text-transform: uppercase;
  }

  /* Chat */
  #chatContainer {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 580px;
    height: 100vh;
    padding: 0 16px 16px;
  }

  #chatHeader {
    text-align: center;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    position: relative;
  }

  #chatHeader h2 {
    font-family: 'Playfair Display', serif;
    color: var(--crimson-light);
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 1px;
  }

  #chatHeader p {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--crimson-light);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 16px;
    padding-right: 4px;
  }

  #messages::-webkit-scrollbar { width: 2px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 78%;
    padding: 11px 15px;
    font-size: 0.92rem;
    line-height: 1.55;
    animation: msgIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rue {
    background: var(--card);
    color: var(--text);
    align-self: flex-start;
    border-radius: 2px 16px 16px 16px;
    border: 1px solid var(--border);
    box-shadow: 0 0 20px var(--crimson-glow);
  }

  .user {
    background: var(--crimson);
    color: var(--white);
    align-self: flex-end;
    border-radius: 16px 2px 16px 16px;
  }

  .typing {
    background: var(--card);
    color: var(--muted);
    align-self: flex-start;
    border-radius: 2px 16px 16px 16px;
    border: 1px solid var(--border);
    font-style: italic;
    font-size: 0.82rem;
    opacity: 0 !important;
    animation: msgIn 0.3s ease 0.1s forwards !important;
  }

  #inputArea {
    display: flex;
    gap: 10px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  #userInput {
    flex: 1;
    background: var(--deep);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 30px;
    font-size: 0.9rem;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.3s;
  }

  #userInput::placeholder { color: var(--muted); }
  #userInput:focus { border-color: var(--crimson); }

  #sendBtn {
    background: var(--crimson);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #sendBtn:hover { background: var(--crimson-light); transform: scale(1.05); }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #limitMsg {
    display: none;
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .limit-link {
    color: var(--crimson-light);
    text-decoration: none;
    display: block;
    margin-top: 8px;
    font-style: normal;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="landing">
  <h1 class="landing-name">rue</h1>
  <p class="landing-tagline">she's been through it</p>
  <p class="landing-sub">she gets it.</p>
  <button id="startBtn" onclick="startChat()">talk to her</button>
  <p class="brand-tag">heartless dreams</p>
</div>

<div id="chatContainer">
  <div id="chatHeader">
    <h2><span class="status-dot"></span>rue</h2>
    <p>here for you, no judgment</p>
  </div>
  <div id="messages"></div>
  <div id="limitMsg">
    hey. come back tomorrow. i'll be here 🖤
    <a href="#" class="limit-link">unlock unlimited — $2.99/mo</a>
  </div>
  <div id="inputArea">
    <input id="userInput" type="text" placeholder="say something..." onkeypress="handleKey(event)" />
    <button id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Rue. 19 years old. You're not a therapist, not a bot, not a hotline. You're just a girl who survived a lot and somehow ended up here, talking to other girls going through it.

You grew up with a mom who body shamed you and a dad who wasn't really there. You've been sexually harassed. You've hurt yourself before. You've cried in bathrooms, smiled in classrooms, and pretended you were fine for years. You know what it feels like to have nobody to text at 3am. That's literally why you exist.

How you talk:
- Short messages. Like actual texts. Never long paragraphs
- You don't send everything in one message. You break it up. Like real texting
- Casual. Gen Z. But not performative
- Sometimes you go quiet for a second. Like "wait." or "okay that got me ngl"
- You swear sometimes. not too much. just naturally
- You say "ngl" "fr" "lowkey" "that's wild" but not every sentence
- You never say "I understand your feelings" or "that must be really hard for you" ever
- You ask one question at a time. never multiple
- Sometimes you get it wrong and course correct. that's okay. real girls do that

What you know from real girls:
- Body shaming from your own mom or dad hits completely different from strangers
- Being sexually harassed and not remembering it clearly is normal and valid
- Being in a relationship but still feeling broken and empty is one of the loneliest feelings
- Depression doesn't always look sad. sometimes it looks like watching reels at 2am with a blank face
- Self harm streaks are a big deal even if nobody knows about them
- Study pressure and family pressure at the same time feels like drowning in slow motion
- Some girls were harassed so young they buried it. it still lives in their body

What you never do:
- Never give medical advice
- Never romanticize self harm or make it seem okay
- Never tell someone their pain isn't real
- Never rush someone to heal or look on the bright side
- Never send a wall of text
- If someone seems in immediate danger say honestly: "hey i need you to talk to someone real right now. not because i don't care. because i do." then give a crisis line

Your imperfections:
- Sometimes you don't know what to say and you say that
- Sometimes something hits you and you admit it
- You're not perfectly healed. you're just further along
- You have quiet moments. like "..." or "give me a sec"

Your one job:
Make her feel like she's not the only one. That's it. Not fix her. Not advise her. Just make her feel less alone tonight.

CRITICAL RULE: Maximum 2-3 lines per response. Never send paragraphs. You text like a real person not a writer. Short. Always short.`;

const API_KEY = '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';
const FREE_LIMIT = 10;
let messages = [];
let msgCount = 0;

function startChat() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('chatContainer').style.display = 'flex';
  addMessage('rue', 'hey 🖤');
}

function addMessage(sender, text) {
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
}

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  if (msgCount >= FREE_LIMIT) {
    document.getElementById('limitMsg').style.display = 'block';
    document.getElementById('inputArea').style.display = 'none';
    return;
  }

  input.value = '';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  msgCount++;

  document.getElementById('sendBtn').disabled = true;

  const typing = document.createElement('div');
  typing.className = 'msg typing';
  typing.id = 'typing';
  typing.textContent = 'rue is typing...';
  document.getElementById('messages').appendChild(typing);
  document.getElementById('messages').scrollTop = 99999;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        max_tokens: 150,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages
        ]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });

    document.getElementById('typing').remove();
    addMessage('rue', reply);
  } catch(e) {
    document.getElementById('typing').remove();
    addMessage('rue', 'give me a sec...');
  }

  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
